name: Generate Sage Xunhuan ConfigMap

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Environment under deploy/<env>"
        required: false
        default: "prod"

permissions:
  contents: write

concurrency:
  group: sage-xunhuan-configmap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate ConfigMap
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    env:
      DEPLOY_ENV: ${{ github.event.inputs.deploy_env || 'prod' }}
      OUTPUT_FILE: deploy/k8s/configmaps/sage_xunhuan_configmap.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sage_xunhuan_configmap.yaml
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          deploy_env = os.environ.get("DEPLOY_ENV") or "prod"
          env_file = Path("deploy") / deploy_env / ".env.example"
          output_file = Path(os.environ["OUTPUT_FILE"])

          def load_env(path):
              values = {}
              if not path.exists():
                  return values
              for raw in path.read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  values[key.strip()] = value
              return values

          def is_ip_address(value):
              return bool(re.match(r"^[0-9]+(\.[0-9]+){3}$", value or "")) or ":" in (value or "")

          values = load_env(env_file)

          # Allow repository/environment variables to override .env.example when explicitly set.
          for key, value in os.environ.items():
              if key.startswith(("SAGE_", "OPENSANDBOX_", "MYSQL_", "RUSTFS_")) and value != "":
                  values[key] = value

          values.setdefault("NAMESPACE", "sage")
          values.setdefault("SAGE_HOST", "")
          values.setdefault("SAGE_PUBLIC_URL", "")
          values.setdefault("SAGE_WEB_SERVICE_TYPE", "NodePort")
          values.setdefault("SAGE_WEB_NODE_PORT", "30080")

          if not values["SAGE_PUBLIC_URL"]:
              if not values["SAGE_HOST"]:
                  values["SAGE_PUBLIC_URL"] = "http://sage.example.com"
              elif is_ip_address(values["SAGE_HOST"]):
                  if values["SAGE_WEB_SERVICE_TYPE"] == "NodePort":
                      values["SAGE_PUBLIC_URL"] = f"http://{values['SAGE_HOST']}:{values['SAGE_WEB_NODE_PORT']}"
                  else:
                      values["SAGE_PUBLIC_URL"] = f"http://{values['SAGE_HOST']}"
              else:
                  values["SAGE_PUBLIC_URL"] = f"https://{values['SAGE_HOST']}"

          defaults = {
              "SAGE_ENV": "production",
              "SAGE_WEB_BASE_PATH": "/sage",
              "SAGE_TRACE_WEB_URL": f"{values['SAGE_PUBLIC_URL']}/jaeger/",
              "SAGE_TRACE_JAEGER_URL": "http://sage-jaeger:4317",
              "SAGE_TRACE_JAEGER_UI_URL": "http://sage-jaeger:16686/jaeger",
              "SAGE_TRACE_JAEGER_PUBLIC_URL": f"{values['SAGE_PUBLIC_URL']}/jaeger",
              "SAGE_TRACE_JAEGER_BASE_PATH": "/api/observability/jaeger",
              "SAGE_API_BASE_URL": values["SAGE_PUBLIC_URL"],
              "SAGE_SANDBOX_MODE": "local",
              "SAGE_SANDBOX_MOUNT_PATHS": "",
              "SAGE_LOCAL_CPU_TIME_LIMIT": "300",
              "SAGE_LOCAL_MEMORY_LIMIT_MB": "4096",
              "SAGE_LOCAL_LINUX_ISOLATION": "subprocess",
              "SAGE_LOCAL_MACOS_ISOLATION": "seatbelt",
              "SAGE_REMOTE_PROVIDER": "opensandbox",
              "OPENSANDBOX_URL": "",
              "OPENSANDBOX_API_KEY": "",
              "OPENSANDBOX_IMAGE": "opensandbox/code-interpreter:v1.0.2",
              "OPENSANDBOX_TIMEOUT": "1800",
              "SAGE_OPENSANDBOX_APPEND_MAX_BYTES": "262144",
              "SAGE_AUTH_MODE": "native",
              "SAGE_TRUSTED_IDENTITY_PROXY_IPS": "127.0.0.1/32,10.0.0.0/8",
              "SAGE_BOOTSTRAP_ADMIN_USERNAME": "admin",
              "SAGE_BOOTSTRAP_ADMIN_PASSWORD": "change_this_admin_password",
              "SAGE_AUTH_PROVIDERS": "",
              "SAGE_JWT_KEY": "change_this_jwt_secret",
              "SAGE_REFRESH_TOKEN_SECRET": "change_this_refresh_secret",
              "SAGE_SESSION_SECRET": "change_this_session_secret",
              "SAGE_SESSION_COOKIE_NAME": "sage_session",
              "SAGE_SESSION_COOKIE_SECURE": "true",
              "SAGE_SESSION_COOKIE_SAME_SITE": "lax",
              "SAGE_CORS_ALLOWED_ORIGINS": "*",
              "SAGE_CORS_ALLOW_CREDENTIALS": "false",
              "SAGE_CORS_ALLOW_METHODS": "*",
              "SAGE_CORS_ALLOW_HEADERS": "*",
              "SAGE_CORS_EXPOSE_HEADERS": "",
              "SAGE_CORS_MAX_AGE": "600",
              "SAGE_OAUTH2_CLIENTS": "",
              "SAGE_OAUTH2_ISSUER": "",
              "SAGE_OAUTH2_ACCESS_TOKEN_EXPIRES_IN": "3600",
              "SAGE_EML_ENDPOINT": "dm.aliyuncs.com",
              "SAGE_EML_ACCESS_KEY_ID": "",
              "SAGE_EML_ACCESS_KEY_SECRET": "",
              "SAGE_EML_SECURITY_TOKEN": "",
              "SAGE_EML_ACCOUNT_NAME": "sage@mail.example.com",
              "SAGE_EML_TEMPLATE_ID": "",
              "SAGE_EML_REGISTER_SUBJECT": "Sage security verification",
              "SAGE_EML_ADDRESS_TYPE": "1",
              "SAGE_EML_REPLY_TO_ADDRESS": "false",
              "SAGE_DEFAULT_LLM_API_KEY": "",
              "SAGE_DEFAULT_LLM_API_BASE_URL": "https://dashscope.aliyuncs.com/compatible-mode/v1/",
              "SAGE_DEFAULT_LLM_MODEL_NAME": "deepseek-v3",
              "SAGE_DEFAULT_LLM_MAX_TOKENS": "4096",
              "SAGE_DEFAULT_LLM_TEMPERATURE": "0.2",
              "SAGE_DEFAULT_LLM_MAX_MODEL_LEN": "52000",
              "SAGE_DB_TYPE": "mysql",
              "SAGE_MYSQL_HOST": "sage-mysql",
              "SAGE_MYSQL_PORT": "3306",
              "SAGE_MYSQL_DATABASE": "sage",
              "SAGE_MYSQL_USER": "root",
              "SAGE_MYSQL_PASSWORD": "change_this_mysql_password",
              "SAGE_ELASTICSEARCH_URL": "",
              "SAGE_ELASTICSEARCH_PORT": "9200",
              "SAGE_ELASTICSEARCH_USERNAME": "elastic",
              "SAGE_ELASTICSEARCH_PASSWORD": "change_this_elasticsearch_password",
              "SAGE_S3_ENDPOINT": "sage-rustfs:9000",
              "SAGE_S3_ACCESS_KEY": "root",
              "SAGE_S3_SECRET_KEY": "change_this_s3_secret",
              "SAGE_S3_SECURE": "false",
              "SAGE_S3_BUCKET_NAME": "sage",
              "SAGE_S3_PUBLIC_BASE_URL": f"{values['SAGE_PUBLIC_URL']}/sage",
              "SAGE_EMBEDDING_API_KEY": "",
              "SAGE_EMBEDDING_BASE_URL": "https://dashscope.aliyuncs.com/compatible-mode/v1/",
              "SAGE_EMBEDDING_MODEL": "text-embedding-v4",
              "SAGE_EMBEDDING_DIMS": "1024",
          }
          for key, value in defaults.items():
              values.setdefault(key, value)

          template_specs = [
              (Path("deploy/k8s/configmaps/sage-config.yaml"), "data"),
              (Path("deploy/k8s/secrets/sage-secrets.yaml"), "stringData"),
          ]
          final_data = {}
          placeholder_re = re.compile(r'^\s{2}([A-Za-z0-9_]+):\s*(?:"\$\{([A-Za-z0-9_]+)\}"|(.+?))\s*$')

          for template, _section in template_specs:
              for line in template.read_text(encoding="utf-8").splitlines():
                  match = placeholder_re.match(line)
                  if not match:
                      continue
                  key, source_key, literal = match.groups()
                  if source_key:
                      final_data[key] = values.get(source_key, "")
                  else:
                      final_data[key] = literal.strip().strip('"')

          final_data["MYSQL_ROOT_PASSWORD"] = values.get("SAGE_MYSQL_PASSWORD", "")
          final_data["RUSTFS_ACCESS_KEY"] = values.get("SAGE_S3_ACCESS_KEY", "")
          final_data["RUSTFS_SECRET_KEY"] = values.get("SAGE_S3_SECRET_KEY", "")

          lines = [
              "apiVersion: v1",
              "kind: ConfigMap",
              "metadata:",
              "  name: sage_xunhuan_configmap",
              "  labels:",
              "    app.kubernetes.io/name: sage",
              "    app.kubernetes.io/part-of: sage",
              "    app.kubernetes.io/generated-by: github-actions",
              "data:",
          ]
          for key in sorted(final_data):
              lines.append(f"  {key}: {json.dumps(str(final_data[key]), ensure_ascii=False)}")

          output_file.parent.mkdir(parents=True, exist_ok=True)
          output_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit generated ConfigMap
        run: |
          if git diff --quiet -- "$OUTPUT_FILE"; then
            echo "No ConfigMap changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          git commit -m "chore: generate sage xunhuan configmap"
          git push
