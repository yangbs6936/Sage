name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff format and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.14"

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Check Ruff lint
        run: ruff check .

  python-tests:
    name: Pytest (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: app
            path: tests/app
          - suite: common
            path: tests/common
          - suite: sagents
            path: tests/sagents

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Suite
        run: python -m pytest ${{ matrix.path }} -v

  web-tests:
    name: Web Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/server/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/server/web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Check Frontend I18n Literals
        run: npm run check:i18n

      - name: Run Vitest
        run: npm test -- --run

  desktop-i18n:
    name: Desktop UI i18n keys
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/desktop/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/desktop/ui/package-lock.json

      - name: Install Desktop UI Dependencies
        run: npm ci

      - name: Check Desktop i18n keys (zh / en)
        run: npm run check:i18n
