x-sage-observability-labels: &sage-observability-labels
  com.sage.environment: ${SAGE_OBSERVABILITY_ENV:-${SAGE_ENV:-development}}

services:
  sage-server-dev:
    restart: always
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.server
    image: sage-server-dev:v1.0
    container_name: sage-server-dev
    volumes:
      - ${SAGE_ROOT}/sage-server/sessions:/app/sessions
      - ${SAGE_ROOT}/sage-server/agents:/app/agents
      - ${SAGE_ROOT}/sage-server/logs:/app/logs
      - ${SAGE_ROOT}/sage-server/data:/app/data
      - ${SAGE_ROOT}/sage-server/skills:/app/skills
      - ${SAGE_ROOT}/sage-server/users:/app/users
    ports:
      - ${SAGE_SERVER_PORT:-30150}:8080
    env_file:
      - ${SAGE_COMPOSE_ENV_FILE:-.env}
    environment:
      SAGE_WEB_BASE_PATH: ${SAGE_WEB_BASE_PATH:-/sage}
      SAGE_TRACE_JAEGER_URL: ${SAGE_TRACE_JAEGER_URL:-http://sage-jaeger:4317}
      SAGE_TRACE_JAEGER_PUBLIC_URL: ${SAGE_TRACE_JAEGER_PUBLIC_URL:-http://127.0.0.1:30151/jaeger}
      SAGE_LOG_LEVEL: ${SAGE_LOG_LEVEL:-DEBUG}
      SAGE_SESSION_DIR: /app/sessions
      SAGE_LOCAL_LINUX_ISOLATION: bwrap
    labels: *sage-observability-labels
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    mem_limit: 16g
    cpus: 4.0
    networks:
      default:
        aliases:
          - sage-server
      shared: {}

  sage-web-dev:
    restart: always
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.web
      args:
        NGINX_CONF: deploy/dev/nginx/nginx.conf
        VITE_SAGE_GRAFANA_URL: ${SAGE_GRAFANA_PUBLIC_URL:-http://127.0.0.1:30093}
    image: sage-web-dev:v1.0
    container_name: sage-web-dev
    ports:
      - ${SAGE_WEB_PORT:-30151}:80
    environment:
      TZ: 'Asia/Shanghai'
    labels: *sage-observability-labels
    mem_limit: 512m
    cpus: 0.5
    networks:
      default: {}
      shared: {}

  sage-mysql-dev:
    restart: always
    image: docker.m.daocloud.io/mysql:8.4
    container_name: sage-mysql-dev
    ports:
      - ${SAGE_MYSQL_PUBLISHED_PORT:-30152}:3306
    environment:
      TZ: 'Asia/Shanghai'
      MYSQL_ROOT_PASSWORD: ${SAGE_MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    labels: *sage-observability-labels
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ${SAGE_ROOT}/mysql/data:/var/lib/mysql
      - ${SAGE_ROOT}/mysql/conf:/etc/mysql/conf.d
    mem_limit: 1g
    cpus: 1.0

networks:
  shared:
    name: ${SAGE_SHARED_NETWORK:-sage_shared_default}
    external: true
