services:
  sage-server:
    restart: always
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.server
    image: sage-server:v1.0
    container_name: sage-server
    volumes:
      - ${SAGE_ROOT}/sage-server/sessions:/app/sessions
      - ${SAGE_ROOT}/sage-server/agents:/app/agents
      - ${SAGE_ROOT}/sage-server/logs:/app/logs
      - ${SAGE_ROOT}/sage-server/data:/app/data
      - ${SAGE_ROOT}/sage-server/skills:/app/skills
      - ${SAGE_ROOT}/sage-server/users:/app/users
    ports:
      - ${SAGE_SERVER_PORT:-30050}:8080
    env_file:
      - ${SAGE_COMPOSE_ENV_FILE:-.env}
    environment:
      SAGE_WEB_BASE_PATH: ${SAGE_WEB_BASE_PATH:-/sage}
      SAGE_TRACE_JAEGER_URL: ${SAGE_TRACE_JAEGER_URL:-http://sage-jaeger:4317}
      SAGE_TRACE_JAEGER_UI_URL: ${SAGE_TRACE_JAEGER_UI_URL:-http://sage-jaeger:16686/jaeger}
      SAGE_TRACE_JAEGER_PUBLIC_URL: ${SAGE_TRACE_JAEGER_PUBLIC_URL:-http://127.0.0.1:30051/jaeger}
      SAGE_TRACE_JAEGER_BASE_PATH: ${SAGE_TRACE_JAEGER_BASE_PATH:-/api/observability/jaeger}
      SAGE_LOG_LEVEL: ${SAGE_LOG_LEVEL:-DEBUG}
      SAGE_SESSION_DIR: /app/sessions
      SAGE_LOCAL_LINUX_ISOLATION: bwrap
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    mem_limit: 16g
    cpus: 4.0
    networks:
      default: {}
      shared: {}

  sage-web:
    restart: always
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.web
      args:
        NGINX_CONF: deploy/prod/nginx/nginx.conf
    image: sage-web:v1.0
    container_name: sage-web
    ports:
      - ${SAGE_WEB_PORT:-30051}:80
    environment:
      TZ: 'Asia/Shanghai'
    networks:
      default: {}
      shared: {}

  sage-mysql:
    restart: always
    image: docker.m.daocloud.io/mysql:8.4
    container_name: sage-mysql
    ports:
      - ${SAGE_MYSQL_PUBLISHED_PORT:-30052}:3306
    environment:
      TZ: 'Asia/Shanghai'
      MYSQL_ROOT_PASSWORD: ${SAGE_MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ${SAGE_ROOT}/mysql/data:/var/lib/mysql
      - ${SAGE_ROOT}/mysql/conf:/etc/mysql/conf.d
    mem_limit: 1g
    cpus: 1.0
  sage-es:
    profiles:
      - es
    restart: always
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.es
    image: sage-es:v1.0
    container_name: sage-es
    ports:
      - ${SAGE_ELASTICSEARCH_PUBLISHED_PORT:-30053}:9200
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${SAGE_ELASTICSEARCH_PASSWORD}
      - xpack.security.enabled=false
      - TAKE_FILE_OWNERSHIP=true
      - "ES_JAVA_OPTS=-Xms1024m -Xmx1024m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ${SAGE_ROOT}/es/data/node:/usr/share/elasticsearch/data
    mem_limit: 2g
    cpus: 1.0

networks:
  shared:
    name: ${SAGE_SHARED_NETWORK:-sage_shared_default}
    external: true
