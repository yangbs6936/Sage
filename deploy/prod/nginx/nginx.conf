server {
  listen 80;
  server_name _;
  absolute_redirect off;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $sage_server_backend sage-server:8080;

  root /usr/share/nginx/html;
  index index.html;

  # Basic security headers
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-XSS-Protection "1; mode=block";

  gzip on;
  gzip_min_length 1k;
  gzip_comp_level 6;
  gzip_types text/plain
      application/javascript
      application/x-javascript
      text/css
      application/xml
      text/javascript
      application/x-httpd-php
      image/jpeg
      image/gif
      image/png;
  gzip_vary on;
  gzip_disable "MSIE [1-6]\.";
  client_max_body_size 512m;
  client_body_buffer_size 20m;
  proxy_connect_timeout 30000s;
  proxy_send_timeout    30000s;
  proxy_read_timeout    30000s;
  send_timeout          30000s;
  proxy_buffer_size 512k;
  proxy_buffers 4  1024k;
  proxy_busy_buffers_size 1024k;
  proxy_cache off;
  proxy_buffering off;
  chunked_transfer_encoding on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 30000;

  location = /_sage_observability_auth {
    internal;
    proxy_pass http://$sage_server_backend/api/observability/jaeger/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $http_host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-URI $request_uri;
  }

  location /api/user/oauth/ {
      proxy_pass http://$sage_server_backend;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 300s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
  }

  location = /jaeger {
      return 301 /jaeger/;
  }

  location ^~ /jaeger/ {
      auth_request /_sage_observability_auth;
      error_page 401 = @jaeger_login;
      proxy_pass http://sage-jaeger:16686;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header Accept-Encoding "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      sub_filter_once off;
      sub_filter 'base href="/"' 'base href="/jaeger/"';
  }

  location @jaeger_login {
    return 302 /prod-api/api/observability/jaeger/login?next=$request_uri;
  }

  location = / {
    return 302 /sage/;
  }

  location = /sage {
    return 301 /sage/;
  }

  location /prod-api/api/ {
      rewrite "^/prod-api/(.*)$" /$1 break;
      proxy_pass http://$sage_server_backend;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 300s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
  }

  location ^~ /sage/assets/ {
    rewrite ^/sage/(.*)$ /$1 break;
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location ^~ /sage/ {
    rewrite ^/sage/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }
}
