log_format sage_access escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr","x_forwarded_for":"$http_x_forwarded_for","method":"$request_method","uri":"$request_uri","status":$status,"request_time":$request_time,"upstream_addr":"$upstream_addr","upstream_status":"$upstream_status"}';

server {
  listen 80;
  server_name _;
  access_log /var/log/nginx/access.log sage_access;

  root /usr/share/nginx/html;
  index index.html;

  # Basic security headers
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-XSS-Protection "1; mode=block";

  gzip on;
  gzip_min_length 1k;
  gzip_comp_level 6;
  gzip_types text/plain
      application/javascript
      application/x-javascript
      text/css
      application/xml
      text/javascript
      application/x-httpd-php
      image/jpeg
      image/gif
      image/png;
  gzip_vary on;
  gzip_disable "MSIE [1-6]\.";
  client_max_body_size 512m;
  client_body_buffer_size 20m;
  proxy_connect_timeout 30000s;
  proxy_send_timeout    30000s;
  proxy_read_timeout    30000s;
  send_timeout          30000s;
  proxy_buffer_size 512k;
  proxy_buffers 4  1024k;
  proxy_busy_buffers_size 1024k;
  proxy_cache off;
  proxy_buffering off;
  chunked_transfer_encoding on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 30000;

  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

}
