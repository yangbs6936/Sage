apiVersion: 1

providers:
  - name: Sage Dashboards
    orgId: 1
    folder: Sage
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards/sage
  - name: Machine Dashboards
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards/machine
